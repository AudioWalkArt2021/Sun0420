<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農產物收據自動化系統 (三聯版)</title>
    <style>
        /* 基本手機版 UI 設定 */
        body { font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; margin: 0; padding: 0; background-color: #f3f4f6; color: #333; }
        .control-panel { padding: 20px; background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border-bottom: 4px solid #4CAF50; }
        h1 { font-size: 1.4rem; color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        input:focus, select:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 5px rgba(76, 175, 80, 0.3); }
        .flex-row { display: flex; gap: 15px; }
        .flex-row .form-group { flex: 1; }
        button { background-color: #4CAF50; color: white; padding: 15px 20px; border: none; border-radius: 8px; font-size: 18px; width: 100%; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { background-color: #45a049; transform: translateY(2px); box-shadow: none; }
        .preset-note { font-size: 12px; color: #888; margin-top: 5px; display: block; }
        
        /* A4 列印排版設定 (一張三份) */
        .receipt-wrapper { background: #fff; padding: 10px; overflow-x: auto; }
        .receipt-page { width: 210mm; min-height: 297mm; margin: 0 auto; background: white; display: flex; flex-direction: column; box-sizing: border-box; }
        
        /* 單張收據的排版壓縮 */
        .receipt-instance { flex: 1; padding: 8mm 15mm; position: relative; box-sizing: border-box; border-bottom: 1px dashed #aaa; }
        .receipt-instance:last-child { border-bottom: none; }
        .receipt-title { text-align: center; font-size: 20px; font-weight: bold; letter-spacing: 2px; margin-bottom: 8px; }
        .receipt-date { text-align: right; margin-bottom: 6px; font-size: 14px; }
        table.receipt-table { width: 100%; border-collapse: collapse; border: 2px solid black; }
        table.receipt-table th, table.receipt-table td { border: 1px solid black; padding: 5px 8px; font-size: 13px; line-height: 1.3; }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        
        /* 預留實體印章空間 */
        .stamp-space { height: 35px; } 
        
        /* 左側直書側註 */
        .side-note { position: absolute; left: 5mm; top: 20mm; writing-mode: vertical-rl; font-size: 11px; letter-spacing: 1px; height: 75mm; color: #333; }
        .note-text { font-size: 11px; text-align: justify; line-height: 1.4; }

        /* 列印模式隱藏 UI */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .receipt-wrapper { padding: 0; overflow: visible; }
            .receipt-page { margin: 0; padding: 0; width: 100%; height: 100vh; box-shadow: none; border: none; page-break-after: avoid; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
<body>

<div class="control-panel no-print">
    <h1>🐑 羊奶收據出貨系統</h1>
    
    <div class="form-group" style="background-color: #e8f5e9; padding: 12px; border-radius: 8px;">
        <label>🏢 快速選擇農會 (抬頭與統編)</label>
        <select id="preset-buyer" onchange="applyPreset()">
            <option value="">-- 自行輸入 或 選擇下方預設 --</option>
            <option value="三峽">新北市三峽區農會</option>
            <option value="三重">新北市三重區農會</option>
            <option value="土城">新北市土城區農會</option>
        </select>
        <span class="preset-note">點選後會自動帶入下方欄位，可再手動微調。</span>
    </div>

    <div class="form-group">
        <label>🗓️ 開立日期</label>
        <input type="date" id="input-date">
    </div>
    
    <div class="flex-row">
        <div class="form-group">
            <label>🏪 抬頭名稱</label>
            <input type="text" id="input-buyer-name" placeholder="請輸入客戶名稱">
        </div>
        <div class="form-group">
            <label>📄 統一編號</label>
            <input type="text" id="input-buyer-taxid" placeholder="若無可空白">
        </div>
    </div>
    
    <div class="form-group">
        <label>📍 買方地址</label>
        <input type="text" id="input-buyer-addr" placeholder="若無可空白">
    </div>

    <hr style="margin:20px 0; border:0; border-top:1px dashed #ccc;">

    <div class="flex-row">
        <div class="form-group">
            <label>🍼 大羊奶 (單價 141)</label>
            <input type="number" id="input-qty1" placeholder="輸入瓶數" min="0">
        </div>
        <div class="form-group">
            <label>🥛 中羊奶 (單價 83)</label>
            <input type="number" id="input-qty2" placeholder="輸入瓶數" min="0">
        </div>
    </div>

    <button onclick="window.print()">🖨️ 列印 A4 (一頁三份)</button>
</div>

<div class="receipt-wrapper">
    <div class="receipt-page" id="receipt-container"></div>
</div>

<template id="receipt-template">
    <div class="receipt-instance">
        <div class="side-note">本收據之農民身分確實無誤，若有不實者願依法接受處罰。 對內容有疑問請優先聯繫 : 0923-287-545</div>
        
        <div class="receipt-title">農（漁、牧）民出售 農（漁、牧）產物 收據</div>
        <div class="receipt-date">中華民國 <span class="p-yy"></span> 年 <span class="p-mm"></span> 月 <span class="p-dd"></span> 日</div>
        
        <table class="receipt-table">
            <tr>
                <td rowspan="2" style="width: 15%" class="center">購買商號名稱：</td>
                <td rowspan="2" style="width: 35%" class="p-buyerName"></td>
                <td style="width: 15%" class="center">統一編號：</td>
                <td style="width: 35%" class="p-buyerTaxId"></td>
            </tr>
            <tr>
                <td class="center">地址：</td>
                <td class="p-buyerAddress"></td>
            </tr>
            <tr class="center bold" style="background-color: #f9f9f9;">
                <td>品名</td>
                <td>數量</td>
                <td>單價</td>
                <td>金額</td>
                <td>備註</td>
            </tr>
            <tr class="center">
                <td>五寮尖大羊奶</td>
                <td class="p-qty1"></td>
                <td>141</td>
                <td class="p-amt1"></td>
                <td></td>
            </tr>
            <tr class="center">
                <td>五寮尖中羊奶</td>
                <td class="p-qty2"></td>
                <td>83</td>
                <td class="p-amt2"></td>
                <td></td>
            </tr>
            <tr>
                <td colspan="2">合計新台幣（中文大寫）： <span class="p-totalZh bold" style="font-size: 16px; margin-left: 10px;"></span></td>
                <td class="center bold">小計</td>
                <td class="center bold p-totalNum" style="font-size: 16px;"></td>
                <td></td>
            </tr>
            <tr>
                <td class="center">本人簽章</td>
                <td class="center">
                    <div class="stamp-space"></div> </td>
                <td class="center">國民身分證<br>統一編號</td>
                <td colspan="2" class="center">F128411025</td>
            </tr>
            <tr>
                <td class="center">農民姓名：<br>住址：</td>
                <td colspan="4">邱順群<br>新北市三峽區金圳里圳頭路1鄰21號</td>
            </tr>
            <tr>
                <td class="center">附註</td>
                <td colspan="4" class="note-text">
                    依據財政部 68.11.01 台財稅第 37665 號函: 自 68 年 11 月 16 日起，凡農民出售其本身所生產、捕獲或畜養之農林漁牧產品所出具之收據，一律免印花稅。農民資格之認定標準，依照農業發展條例第3條及該條例施行細則第1條第1款規定係指直接作業或經營農業生產之自然人。
                </td>
            </tr>
        </table>
    </div>
</template>

<script>
    // 預設農會資料庫
    const presetsData = {
        "三峽": { name: "新北市三峽區農會", taxid: "83076928" },
        "三重": { name: "新北市三重區農會", taxid: "78295698" },
        "土城": { name: "新北市土城區農會", taxid: "33002958" }
    };

    // 套用預設農會
    function applyPreset() {
        const selected = document.getElementById('preset-buyer').value;
        if (presetsData[selected]) {
            document.getElementById('input-buyer-name').value = presetsData[selected].name;
            document.getElementById('input-buyer-taxid').value = presetsData[selected].taxid;
            updateReceipt();
        }
    }

    // 初始化：將模板複製 3 份放入容器中
    const container = document.getElementById('receipt-container');
    const template = document.getElementById('receipt-template');
    for (let i = 0; i < 3; i++) {
        container.appendChild(template.content.cloneNode(true));
    }

    // 數字轉中文大寫邏輯
    function convertToChinese(num) {
        if (!num || num === 0) return "零元整";
        const chnNumChar = ["零","壹","貳","參","肆","伍","陸","柒","捌","玖"];
        const chnUnitChar = ["","拾","佰","仟"];
        const chnUnitSection = ["","萬","億","兆"];
        let strIns = '', chnStr = '';
        let unitPos = 0, zero = true;
        while(num > 0){
            let v = num % 10;
            if(v === 0){
                if(!zero){
                    zero = true;
                    chnStr = chnNumChar[v] + chnStr;
                }
            }else{
                zero = false;
                strIns = chnNumChar[v];
                strIns += chnUnitChar[unitPos];
                chnStr = strIns + chnStr;
            }
            unitPos++;
            num = Math.floor(num / 10);
        }
        if (chnStr.startsWith('零')) chnStr = chnStr.substring(1);
        return chnStr + "元整";
    }

    // 批次更新所有欄位 (因為有 3 份收據需要同步更新)
    function updateField(className, value) {
        document.querySelectorAll('.' + className).forEach(el => {
            el.innerText = value;
        });
    }

    // 更新收據畫面邏輯
    function updateReceipt() {
        // 更新日期
        const dateInput = document.getElementById('input-date').value;
        if(dateInput) {
            const d = new Date(dateInput);
            updateField('p-yy', d.getFullYear() - 1911);
            updateField('p-mm', d.getMonth() + 1);
            updateField('p-dd', d.getDate());
        }

        // 更新買方資訊
        updateField('p-buyerName', document.getElementById('input-buyer-name').value);
        updateField('p-buyerTaxId', document.getElementById('input-buyer-taxid').value);
        updateField('p-buyerAddress', document.getElementById('input-buyer-addr').value);

        // 計算金額
        const qty1 = parseInt(document.getElementById('input-qty1').value) || 0;
        const qty2 = parseInt(document.getElementById('input-qty2').value) || 0;
        const price1 = 141;
        const price2 = 83;
        
        const amt1 = qty1 * price1;
        const amt2 = qty2 * price2;
        const total = amt1 + amt2;

        // 更新表格數據
        updateField('p-qty1', qty1 || '');
        updateField('p-amt1', amt1 || '');
        updateField('p-qty2', qty2 || '');
        updateField('p-amt2', amt2 || '');
        
        updateField('p-totalNum', total || '');
        updateField('p-totalZh', total > 0 ? convertToChinese(total) : '');
    }

    // 綁定事件：當輸入框內容改變時即時更新
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', updateReceipt);
    });

    // 預設填入今天日期
    document.getElementById('input-date').valueAsDate = new Date();
    updateReceipt();
</script>

</body>
</html>
